<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>塔羅占卜｜命運之鏡</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Noto+Serif+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #05030f;
    --night: #0d0820;
    --dark: #130c2e;
    --mid: #1e1248;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6230;
    --silver: #a8b4c8;
    --rose: #9b4f6e;
    --teal: #2a7a8a;
    --text: #d4c8f0;
    --text-dim: #8878b0;
    --card-back: #12093a;
    --card-front: #0e0730;
    --glow: rgba(201,168,76,0.3);
    --glow-strong: rgba(201,168,76,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--deep);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield */
  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.7;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 36px 0 24px;
  }

  .header-sigil {
    font-size: 2.4rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-shadow: 0 0 30px var(--glow-strong), 0 0 60px var(--glow);
    animation: breathe 4s ease-in-out infinite;
    margin-bottom: 6px;
    display: block;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.85; text-shadow: 0 0 20px var(--glow), 0 0 40px rgba(201,168,76,0.2); }
    50% { opacity: 1; text-shadow: 0 0 40px var(--glow-strong), 0 0 80px var(--glow); }
  }

  .header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.3rem, 5vw, 2rem);
    color: var(--gold-light);
    letter-spacing: 0.15em;
    text-shadow: 0 0 20px var(--glow);
    margin-bottom: 6px;
  }

  .header-sub {
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    font-weight: 300;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    opacity: 0.4;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold));
  }
  .divider::after { background: linear-gradient(to left, transparent, var(--gold)); }
  .divider span { color: var(--gold); font-size: 0.9rem; }

  /* Section Card */
  .section-card {
    background: linear-gradient(135deg, rgba(19,12,46,0.95), rgba(13,8,32,0.98));
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    padding: 22px 20px;
    margin-bottom: 18px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
  }

  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    color: var(--gold-dim);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--gold-dim), transparent);
    opacity: 0.5;
  }

  /* Question Input */
  .question-label {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: block;
  }

  textarea#question {
    width: 100%;
    background: rgba(5,3,15,0.7);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem;
    line-height: 1.7;
    padding: 14px 16px;
    resize: none;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    min-height: 90px;
  }
  textarea#question::placeholder { color: var(--text-dim); opacity: 0.5; }
  textarea#question:focus {
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
  }

  /* Count Selector */
  .count-selector {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  .count-btn {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    padding: 12px 8px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    line-height: 1.4;
  }
  .count-btn .count-num {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    color: var(--gold-dim);
    display: block;
    transition: all 0.3s;
  }
  .count-btn .count-desc {
    font-size: 0.7rem;
    opacity: 0.6;
    display: block;
    margin-top: 2px;
  }
  .count-btn:hover { border-color: rgba(201,168,76,0.45); }
  .count-btn.active {
    background: rgba(201,168,76,0.08);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
  }
  .count-btn.active .count-num { color: var(--gold-light); }
  .count-btn.active .count-desc { opacity: 0.9; }

  /* Draw Button */
  .draw-btn {
    width: 100%;
    background: linear-gradient(135deg, #8a6520, #c9a84c, #8a6520);
    background-size: 200% 100%;
    border: none;
    border-radius: 12px;
    color: var(--deep);
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.25em;
    padding: 16px;
    cursor: pointer;
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
    margin-top: 18px;
    text-transform: uppercase;
  }
  .draw-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .draw-btn:hover::before { opacity: 1; }
  .draw-btn:hover { background-position: 100% 0; box-shadow: 0 6px 30px rgba(201,168,76,0.4); }
  .draw-btn:active { transform: scale(0.98); }
  .draw-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* Spread Area */
  .spread-container {
    display: none;
    animation: fadeIn 0.6s ease;
  }
  .spread-container.visible { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

  .spread-title {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: var(--gold-dim);
    letter-spacing: 0.35em;
    text-align: center;
    margin-bottom: 20px;
    opacity: 0.8;
  }

  /* Cards Grid */
  .cards-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    margin-bottom: 22px;
  }

  .card-slot {
    width: calc(33.33% - 10px);
    max-width: 160px;
    aspect-ratio: 2/3.5;
    perspective: 1000px;
  }

  .cards-grid.five-cards .card-slot {
    width: calc(20% - 12px);
    max-width: 110px;
  }

  @media (max-width: 400px) {
    .card-slot { width: calc(33.33% - 9px); }
    .cards-grid.five-cards .card-slot { width: calc(20% - 10px); }
  }

  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: default;
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 10px;
    overflow: hidden;
  }

  .card-back {
    background: var(--card-back);
    border: 1px solid rgba(201,168,76,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 30px rgba(201,168,76,0.08);
  }

  .card-back-design {
    width: 85%;
    height: 85%;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: radial-gradient(ellipse at center, rgba(30,18,72,0.8) 0%, rgba(12,8,30,0.9) 100%);
  }
  .card-back-design::before {
    content: '✦';
    font-size: 1.6rem;
    color: rgba(201,168,76,0.4);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .card-back-design::after {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px;
  }

  /* Corner ornaments for card back */
  .card-back-corner {
    position: absolute;
    font-size: 0.5rem;
    color: rgba(201,168,76,0.5);
    line-height: 1;
  }
  .card-back-corner.tl { top: 4px; left: 5px; }
  .card-back-corner.tr { top: 4px; right: 5px; }
  .card-back-corner.bl { bottom: 4px; left: 5px; }
  .card-back-corner.br { bottom: 4px; right: 5px; }

  .card-front {
    background: var(--card-front);
    border: 1px solid rgba(201,168,76,0.35);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    box-shadow: 0 6px 30px rgba(0,0,0,0.6), 0 0 20px rgba(201,168,76,0.12);
  }

  .card-front.reversed .card-art-wrap { transform: rotate(180deg); }
  .card-front.reversed { border-color: rgba(155, 79, 110, 0.5); }

  .card-art-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 8px 4px;
    transition: transform 0s;
  }

  .card-symbol {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    line-height: 1;
    filter: drop-shadow(0 0 8px var(--glow));
  }

  .card-info {
    padding: 5px 6px 7px;
    text-align: center;
    border-top: 1px solid rgba(201,168,76,0.15);
    background: rgba(0,0,0,0.3);
    flex-shrink: 0;
  }

  .card-number {
    font-family: 'Cinzel', serif;
    font-size: 0.52rem;
    color: var(--gold-dim);
    letter-spacing: 0.15em;
    display: block;
  }

  .card-name {
    font-size: clamp(0.58rem, 1.8vw, 0.72rem);
    color: var(--gold-light);
    font-weight: 500;
    display: block;
    line-height: 1.3;
    margin-top: 2px;
  }

  .card-orientation {
    font-size: 0.5rem;
    margin-top: 2px;
    display: block;
    letter-spacing: 0.08em;
  }
  .card-orientation.upright { color: rgba(168,210,196,0.8); }
  .card-orientation.reversed { color: rgba(155,79,110,0.9); }

  /* Reading Section */
  .reading-section {
    display: none;
    animation: fadeIn 0.6s ease;
  }
  .reading-section.visible { display: block; }

  .reading-card {
    background: linear-gradient(135deg, rgba(19,12,46,0.97), rgba(13,8,32,0.99));
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 14px;
    padding: 20px 18px;
    margin-bottom: 14px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
    animation: slideUp 0.5s ease backwards;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; }
  }

  .reading-card-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
  }

  .reading-card-icon {
    width: 50px;
    height: 70px;
    background: var(--card-front);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 7px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1.4rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .reading-card-icon.rev { filter: saturate(0.7); border-color: rgba(155,79,110,0.4); }

  .reading-card-icon-name {
    font-size: 0.42rem;
    color: var(--gold-dim);
    text-align: center;
    padding: 3px 2px 2px;
    border-top: 1px solid rgba(201,168,76,0.15);
    line-height: 1.3;
    font-family: 'Noto Serif TC', serif;
  }

  .reading-card-title {
    flex: 1;
  }

  .reading-pos-label {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    color: var(--gold-dim);
    letter-spacing: 0.3em;
    display: block;
    margin-bottom: 4px;
  }

  .reading-card-name {
    font-size: 1.1rem;
    color: var(--gold-light);
    font-weight: 700;
    display: block;
    line-height: 1.3;
  }

  .reading-card-orient {
    font-size: 0.72rem;
    margin-top: 3px;
    display: block;
    font-weight: 500;
  }
  .reading-card-orient.upright { color: rgba(168,210,196,0.9); }
  .reading-card-orient.reversed { color: rgba(200,110,150,0.9); }

  .reading-section-label {
    font-size: 0.68rem;
    color: var(--gold-dim);
    letter-spacing: 0.25em;
    font-family: 'Cinzel', serif;
    margin: 12px 0 5px;
    display: block;
  }

  .reading-text {
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.85;
    opacity: 0.9;
  }

  .reading-timing {
    background: rgba(201,168,76,0.06);
    border-left: 2px solid rgba(201,168,76,0.4);
    border-radius: 0 8px 8px 0;
    padding: 10px 14px;
    margin-top: 10px;
  }

  .reading-timing-label {
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 0.25em;
    font-family: 'Cinzel', serif;
    display: block;
    margin-bottom: 4px;
  }

  .reading-timing-text {
    font-size: 0.83rem;
    color: var(--silver);
    line-height: 1.7;
  }

  /* Copy Button */
  .copy-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 10px;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    padding: 14px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .copy-btn:hover {
    background: rgba(201,168,76,0.08);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
  }
  .copy-btn.copied {
    border-color: rgba(100,200,160,0.5);
    color: rgba(130,220,180,0.9);
  }

  /* Reset Button */
  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(138,98,160,0.4);
    border-radius: 10px;
    color: rgba(180,140,220,0.7);
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.2em;
    padding: 13px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 10px;
  }
  .reset-btn:hover {
    background: rgba(138,98,160,0.08);
    border-color: rgba(138,98,160,0.6);
    color: rgba(200,170,240,0.9);
  }

  /* Loading */
  .drawing-animation {
    text-align: center;
    padding: 30px;
    display: none;
  }
  .drawing-animation.visible { display: block; }
  .drawing-orb {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: 2px solid var(--gold-dim);
    border-top-color: var(--gold);
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
    box-shadow: 0 0 20px var(--glow);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .drawing-text {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: var(--gold-dim);
    letter-spacing: 0.3em;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* Position labels for spreads */
  .position-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .position-tag {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.68rem;
    color: var(--text-dim);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.1em;
  }
  .position-tag span {
    color: var(--gold-dim);
    margin-right: 5px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px 0 10px;
    font-size: 0.65rem;
    color: var(--text-dim);
    opacity: 0.4;
    letter-spacing: 0.2em;
  }

  /* Particle sparkle */
  @keyframes twinkle {
    0%,100%{opacity:0;transform:scale(0.5)}
    50%{opacity:1;transform:scale(1)}
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="content">
  <!-- Header -->
  <div class="header">
    <span class="header-sigil">☽ ✦ ☾</span>
    <h1>命運之鏡</h1>
    <div class="header-sub">TAROT · 78張完整牌組 · 含正逆位</div>
  </div>

  <!-- Question Section -->
  <div class="section-card">
    <div class="section-title">你的問題</div>
    <span class="question-label">將心中的問題傾注其中，塔羅將為你指引方向</span>
    <textarea id="question" rows="3" placeholder="例：我目前的感情狀況如何？這份工作適合我嗎？"></textarea>
  </div>

  <!-- Card Count Selector -->
  <div class="section-card">
    <div class="section-title">牌陣選擇</div>
    <div class="count-selector">
      <button class="count-btn active" data-count="3" onclick="selectCount(3)">
        <span class="count-num">3</span>
        <span class="count-desc">過去・現在・未來</span>
      </button>
      <button class="count-btn" data-count="5" onclick="selectCount(5)">
        <span class="count-num">5</span>
        <span class="count-desc">五角星完整牌陣</span>
      </button>
    </div>
    <button class="draw-btn" id="drawBtn" onclick="startDrawing()">
      ✦ 開始占卜 ✦
    </button>
  </div>

  <!-- Drawing Animation -->
  <div class="drawing-animation" id="drawingAnim">
    <div class="drawing-orb"></div>
    <div class="drawing-text">正在與命運溝通中…</div>
  </div>

  <!-- Spread Area -->
  <div class="spread-container" id="spreadContainer">
    <div class="section-card">
      <div class="spread-title" id="spreadTitle">過去 · 現在 · 未來</div>
      <div class="position-tags" id="positionTags"></div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </div>

  <!-- Reading Section -->
  <div class="reading-section" id="readingSection">
    <div class="section-card" style="padding:0;overflow:hidden;border-color:rgba(201,168,76,0.15)">
      <div style="padding:16px 18px 12px;border-bottom:1px solid rgba(201,168,76,0.1)">
        <div class="section-title" style="margin-bottom:0">解讀詳情</div>
      </div>
      <div id="readingContent" style="padding:16px 18px"></div>
    </div>
    <button class="copy-btn" id="copyBtn" onclick="copyResult()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      一鍵複製占卜結果
    </button>
    <button class="reset-btn" onclick="resetAll()">✦ 重新占卜 ✦</button>
  </div>

  <div class="footer">願星光引領你走向真實的自己 ✦ 塔羅僅供參考，一切的答案在你心中</div>
</div>

<script>
// ==============================
// TAROT DATA - 78 CARDS
// ==============================
const TAROT = [
  // === MAJOR ARCANA ===
  {

// ==============================
// SPREAD CONFIGS
// ==============================
const SPREADS = {
  3: {
    title: "過去 · 現在 · 未來",
    positions: ["過去", "現在", "未來"]
  },
  5: {
    title: "五角星完整牌陣",
    positions: ["處境", "挑戰", "潛意識", "建議", "結果"]
  }
};

// ==============================
// STATE
// ==============================
let selectedCount = 3;
let drawnCards = [];
let isDrawing = false;

// ==============================
// STARS ANIMATION
// ==============================
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];

function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 8000);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      alpha: Math.random(),
      speed: Math.random() * 0.005 + 0.002,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const now = Date.now() * 0.001;
  stars.forEach(s => {
    const a = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(now * s.speed * 10 + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,190,255,${a * 0.8})`;
    ctx.fill();
  });
  requestAnimationFrame(animateStars);
}

initStars();
animateStars();
window.addEventListener('resize', initStars);

// ==============================
// FUNCTIONS
// ==============================
function selectCount(n) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.count === n);
  });
}

function shuffleAndDraw(count) {
  const indices = Array.from({length: 78}, (_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  return indices.slice(0, count).map(i => ({
    card: TAROT[i],
    reversed: Math.random() < 0.5
  }));
}

function startDrawing() {
  if (isDrawing) return;
  isDrawing = true;

  const drawBtn = document.getElementById('drawBtn');
  drawBtn.disabled = true;

  // Hide previous results
  document.getElementById('spreadContainer').classList.remove('visible');
  document.getElementById('readingSection').classList.remove('visible');
  document.getElementById('drawingAnim').classList.add('visible');

  // Shuffle & draw
  drawnCards = shuffleAndDraw(selectedCount);

  const spread = SPREADS[selectedCount];

  setTimeout(() => {
    document.getElementById('drawingAnim').classList.remove('visible');
    buildSpread(spread);
    buildReading(spread);

    setTimeout(() => {
      document.getElementById('readingSection').classList.add('visible');
    }, selectedCount * 1200 + 800);

    isDrawing = false;
    drawBtn.disabled = false;
  }, 1400);
}

function buildSpread(spread) {
  const container = document.getElementById('spreadContainer');
  const grid = document.getElementById('cardsGrid');
  const posTagsEl = document.getElementById('positionTags');
  const titleEl = document.getElementById('spreadTitle');

  titleEl.textContent = spread.title;
  grid.innerHTML = '';
  posTagsEl.innerHTML = '';
  grid.className = 'cards-grid' + (selectedCount === 5 ? ' five-cards' : '');

  // Position tags
  spread.positions.forEach((pos, i) => {
    const tag = document.createElement('div');
    tag.className = 'position-tag';
    tag.innerHTML = `<span>${i + 1}</span>${pos}`;
    posTagsEl.appendChild(tag);
  });

  // Build card slots
  drawnCards.forEach((drawn, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.id = `slot-${i}`;

    const inner = document.createElement('div');
    inner.className = 'card-inner';
    inner.id = `card-inner-${i}`;

    // Card Back
    const back = document.createElement('div');
    back.className = 'card-face card-back';
    back.innerHTML = `
      <div class="card-back-design">
        <span class="card-back-corner tl">✦</span>
        <span class="card-back-corner tr">✦</span>
        <span class="card-back-corner bl">✦</span>
        <span class="card-back-corner br">✦</span>
      </div>`;

    // Card Front
    const front = document.createElement('div');
    front.className = 'card-face card-front' + (drawn.reversed ? ' reversed' : '');

    const orientLabel = drawn.reversed ? '逆位' : '正位';
    front.innerHTML = `
      <div class="card-art-wrap">
        <span class="card-symbol">${drawn.card.symbol}</span>
      </div>
      <div class="card-info">
        <span class="card-number">${drawn.card.suit} ${drawn.card.num}</span>
        <span class="card-name">${drawn.card.name}</span>
        <span class="card-orientation ${drawn.reversed ? 'reversed' : 'upright'}">${orientLabel}</span>
      </div>`;

    inner.appendChild(back);
    inner.appendChild(front);
    slot.appendChild(inner);
    grid.appendChild(slot);
  });

  container.classList.add('visible');

  // Flip cards with delay
  drawnCards.forEach((_, i) => {
    const delay = 500 + i * 1200;
    setTimeout(() => {
      const cardInner = document.getElementById(`card-inner-${i}`);
      if (cardInner) cardInner.classList.add('flipped');
    }, delay);
  });
}

function buildReading(spread) {
  const content = document.getElementById('readingContent');
  content.innerHTML = '';

  drawnCards.forEach((drawn, i) => {
    const card = drawn.card;
    const isRev = drawn.reversed;
    const posLabel = spread.positions[i];
    const meaning = isRev ? card.reversed : card.upright;
    const timing = isRev ? card.timing_rev : card.timing_up;

    const rc = document.createElement('div');
    rc.className = 'reading-card';
    rc.style.animationDelay = `${(i * 1200 + 800) * 0.001}s`;

    rc.innerHTML = `
      <div class="reading-card-header">
        <div class="reading-card-icon ${isRev ? 'rev' : ''}">
          <div style="font-size:1.3rem;${isRev ? 'transform:rotate(180deg)' : ''}">${card.symbol}</div>
          <div class="reading-card-icon-name">${card.name}</div>
        </div>
        <div class="reading-card-title">
          <span class="reading-pos-label">第 ${i + 1} 張 · ${posLabel}</span>
          <span class="reading-card-name">${card.name}</span>
          <span class="reading-card-orient ${isRev ? 'reversed' : 'upright'}">${isRev ? '▽ 逆位' : '△ 正位'} · ${card.suit} ${card.num}</span>
        </div>
      </div>
      <div class="reading-text">${meaning}</div>
      <div class="reading-timing">
        <span class="reading-timing-label">⏳ 適用時機</span>
        <div class="reading-timing-text">${timing}</div>
      </div>`;

    content.appendChild(rc);
  });
}

function copyResult() {
  const question = document.getElementById('question').value.trim();
  const spread = SPREADS[selectedCount];
  let text = '【塔羅占卜結果】\n';
  text += '═══════════════════\n';
  if (question) text += `✦ 問題：${question}\n`;
  text += `✦ 牌陣：${spread.title}\n`;
  text += '═══════════════════\n\n';

  drawnCards.forEach((drawn, i) => {
    const card = drawn.card;
    const isRev = drawn.reversed;
    const pos = spread.positions[i];
    const meaning = isRev ? card.reversed : card.upright;
    const timing = isRev ? card.timing_rev : card.timing_up;

    text += `【第 ${i + 1} 張 · ${pos}】\n`;
    text += `${card.name}（${card.suit} ${card.num}）${isRev ? ' ▽ 逆位' : ' △ 正位'}\n`;
    text += `${meaning}\n`;
    text += `⏳ 適用時機：${timing}\n\n`;
  });

  text += '═══════════════════\n';
  text += '願星光引領你走向真實的自己 ✦';

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 複製成功！`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 一鍵複製占卜結果`;
    }, 2500);
  }).catch(() => {
    // Fallback
    const el = document.createElement('textarea');
    el.value = text;
    el.style.position = 'fixed';
    el.style.opacity = '0';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.textContent = '✓ 複製成功！';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 一鍵複製占卜結果`;
    }, 2500);
  });
}

function resetAll() {
  document.getElementById('question').value = '';
  document.getElementById('spreadContainer').classList.remove('visible');
  document.getElementById('readingSection').classList.remove('visible');
  drawnCards = [];
  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
