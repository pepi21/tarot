<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>塔羅占卜｜命運之鏡</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=Noto+Serif+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --deep: #05030f;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: #7a6230;
    --text: #d4c8f0;
    --text-dim: #8878b0;
    --card-back: #12093a;
    --card-front: #0e0730;
    --glow: rgba(201,168,76,0.3);
    --glow-strong: rgba(201,168,76,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--deep);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.7;
  }

  .content {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 36px 0 24px;
  }
  .header-sigil {
    font-size: 2rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    animation: breathe 4s ease-in-out infinite;
    margin-bottom: 6px;
    display: block;
  }
  @keyframes breathe {
    0%,100% { opacity: 0.8; text-shadow: 0 0 20px var(--glow); }
    50% { opacity: 1; text-shadow: 0 0 40px var(--glow-strong), 0 0 80px var(--glow); }
  }
  .header h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.3rem, 5vw, 1.9rem);
    color: var(--gold-light);
    letter-spacing: 0.15em;
    text-shadow: 0 0 20px var(--glow);
    margin-bottom: 6px;
  }
  .header-sub {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.3em;
    font-weight: 300;
  }

  /* Section Card */
  .section-card {
    background: linear-gradient(135deg, rgba(19,12,46,0.95), rgba(13,8,32,0.98));
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    padding: 20px 18px;
    margin-bottom: 16px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
  }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    color: var(--gold-dim);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--gold-dim), transparent);
    opacity: 0.4;
  }

  /* Question */
  textarea#question {
    width: 100%;
    background: rgba(5,3,15,0.7);
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    font-size: 0.95rem;
    line-height: 1.75;
    padding: 13px 15px;
    resize: none;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    min-height: 80px;
  }
  textarea#question::placeholder { color: var(--text-dim); opacity: 0.45; }
  textarea#question:focus {
    border-color: rgba(201,168,76,0.45);
    box-shadow: 0 0 18px rgba(201,168,76,0.08);
  }

  /* Count Selector */
  .count-selector {
    display: flex;
    gap: 10px;
  }
  .count-btn {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 10px;
    color: var(--text-dim);
    font-family: 'Noto Serif TC', serif;
    padding: 11px 6px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .count-btn .n {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    color: var(--gold-dim);
    display: block;
    transition: color 0.3s;
    line-height: 1.1;
  }
  .count-btn .d {
    font-size: 0.65rem;
    opacity: 0.55;
    display: block;
    margin-top: 3px;
    letter-spacing: 0.05em;
  }
  .count-btn.active {
    background: rgba(201,168,76,0.07);
    border-color: var(--gold);
    box-shadow: 0 0 18px rgba(201,168,76,0.12);
  }
  .count-btn.active .n { color: var(--gold-light); }
  .count-btn.active .d { opacity: 0.85; color: var(--text); }

  /* Draw Button */
  .draw-btn {
    width: 100%;
    background: linear-gradient(135deg, #7a5818, #c9a84c, #7a5818);
    background-size: 200% 100%;
    border: none;
    border-radius: 12px;
    color: #1a0e00;
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.28em;
    padding: 15px;
    cursor: pointer;
    transition: all 0.4s;
    margin-top: 14px;
  }
  .draw-btn:hover { background-position: 100% 0; box-shadow: 0 6px 28px rgba(201,168,76,0.38); }
  .draw-btn:active { transform: scale(0.985); }
  .draw-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; transform: none; }

  /* Loading */
  .drawing-animation { text-align: center; padding: 28px; display: none; }
  .drawing-animation.visible { display: block; }
  .drawing-orb {
    width: 52px; height: 52px;
    border-radius: 50%;
    border: 2px solid var(--gold-dim);
    border-top-color: var(--gold);
    animation: spin 1s linear infinite;
    margin: 0 auto 14px;
    box-shadow: 0 0 18px var(--glow);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .drawing-text {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold-dim);
    letter-spacing: 0.3em;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* Cards */
  .spread-container { display: none; animation: fadeIn 0.5s ease; }
  .spread-container.visible { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

  .cards-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  /* Card sizing: 3 per row for 3-card, 5-card */
  .card-slot {
    width: calc(33.33% - 8px);
    max-width: 150px;
    aspect-ratio: 5/8;
    perspective: 900px;
  }
  .cards-grid.five-cards .card-slot {
    width: calc(20% - 9px);
    max-width: 110px;
  }

  .card-inner {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4,0,0.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 9px;
    overflow: hidden;
  }

  /* Back */
  .card-back {
    background: var(--card-back);
    border: 1px solid rgba(201,168,76,0.32);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 18px rgba(0,0,0,0.5);
  }
  .card-back-inner {
    width: 82%; height: 82%;
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 5px;
    background: radial-gradient(ellipse at center, rgba(28,16,68,0.8), rgba(10,6,26,0.95));
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .card-back-inner::before { content:'✦'; font-size:1.3rem; color:rgba(201,168,76,0.3); }
  .card-back-inner::after {
    content:''; position:absolute; inset:5px;
    border: 1px solid rgba(201,168,76,0.1); border-radius:3px;
  }

  /* Front */
  .card-front {
    background: linear-gradient(160deg, #0d0928 0%, #07041a 100%);
    border: 1px solid rgba(201,168,76,0.32);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 8px;
    gap: 6px;
    box-shadow: 0 6px 28px rgba(0,0,0,0.6);
    text-align: center;
  }
  .card-front.reversed { border-color: rgba(160,80,120,0.45); }

  /* Corner ornament lines */
  .card-front::before, .card-front::after {
    content: '';
    position: absolute;
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 6px;
    pointer-events: none;
  }
  .card-front::before { inset: 5px; }

  .card-suit {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.42rem, 1.3vw, 0.55rem);
    color: var(--gold-dim);
    letter-spacing: 0.15em;
    opacity: 0.8;
  }
  .card-num {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    color: rgba(201,168,76,0.5);
    letter-spacing: 0.1em;
  }
  .card-name-text {
    font-size: clamp(0.72rem, 2.2vw, 0.95rem);
    color: var(--gold-light);
    font-weight: 700;
    line-height: 1.25;
    letter-spacing: 0.05em;
  }
  .card-en {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.38rem, 1.1vw, 0.48rem);
    color: var(--text-dim);
    letter-spacing: 0.08em;
    opacity: 0.6;
    line-height: 1.3;
  }
  .card-orient {
    font-size: clamp(0.45rem, 1.3vw, 0.55rem);
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .card-orient.up { color: rgba(150,210,185,0.85); }
  .card-orient.rev { color: rgba(210,100,145,0.9); }

  /* Reversed card: rotate content instead of border flip */
  .card-front.reversed .card-content { transform: rotate(180deg); }
  .card-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    width: 100%;
  }

  /* Action */
  .action-area { display: none; animation: fadeIn 0.5s ease; }
  .action-area.visible { display: block; }

  .copy-btn {
    width: 100%;
    background: rgba(201,168,76,0.07);
    border: 1px solid rgba(201,168,76,0.38);
    border-radius: 12px;
    color: var(--gold-light);
    font-family: 'Cinzel', serif;
    font-size: 0.88rem;
    letter-spacing: 0.15em;
    padding: 16px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    margin-bottom: 11px;
  }
  .copy-btn:hover {
    background: rgba(201,168,76,0.13);
    border-color: var(--gold);
    box-shadow: 0 0 22px rgba(201,168,76,0.18);
  }
  .copy-btn.copied {
    border-color: rgba(90,200,155,0.55);
    color: rgba(130,220,178,0.95);
    background: rgba(90,200,155,0.06);
  }

  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid rgba(110,80,150,0.3);
    border-radius: 12px;
    color: rgba(160,130,200,0.55);
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    padding: 13px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .reset-btn:hover {
    background: rgba(110,80,150,0.07);
    border-color: rgba(140,100,190,0.45);
    color: rgba(190,160,230,0.8);
  }

  .footer {
    text-align: center;
    padding: 14px 0 4px;
    font-size: 0.6rem;
    color: var(--text-dim);
    opacity: 0.3;
    letter-spacing: 0.2em;
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="content">

  <div class="header">
    <span class="header-sigil">☽ ✦ ☾</span>
    <h1>命運之鏡</h1>
    <div class="header-sub">TAROT · 78張完整牌組 · 含正逆位</div>
  </div>

  <div class="section-card">
    <div class="section-title">你的問題</div>
    <textarea id="question" rows="3" placeholder="將心中的問題寫下，抽牌後一鍵複製給 AI 解讀…"></textarea>
  </div>

  <div class="section-card">
    <div class="section-title">抽牌張數</div>
    <div class="count-selector">
      <button class="count-btn active" data-count="1" onclick="selectCount(1)">
        <span class="n">1</span><span class="d">單張</span>
      </button>
      <button class="count-btn" data-count="3" onclick="selectCount(3)">
        <span class="n">3</span><span class="d">三張</span>
      </button>
      <button class="count-btn" data-count="5" onclick="selectCount(5)">
        <span class="n">5</span><span class="d">五張</span>
      </button>
      <button class="count-btn" data-count="7" onclick="selectCount(7)">
        <span class="n">7</span><span class="d">七張</span>
      </button>
      <button class="count-btn" data-count="10" onclick="selectCount(10)">
        <span class="n">10</span><span class="d">十張</span>
      </button>
    </div>
    <button class="draw-btn" id="drawBtn" onclick="startDrawing()">✦ 開始占卜 ✦</button>
  </div>

  <div class="drawing-animation" id="drawingAnim">
    <div class="drawing-orb"></div>
    <div class="drawing-text">正在與命運溝通中…</div>
  </div>

  <div class="spread-container section-card" id="spreadContainer">
    <div class="section-title" id="spreadTitle">抽牌結果</div>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <div class="action-area" id="actionArea">
    <button class="copy-btn" id="copyBtn" onclick="copyResult()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      複製問題 ＋ 抽牌結果
    </button>
    <button class="reset-btn" onclick="resetAll()">✦ 重新占卜 ✦</button>
  </div>

  <div class="footer">塔羅僅供參考，一切答案在你心中 ✦</div>
</div>

  {name:"錢幣九",   en:"Nine of Pentacles",   num:"9",    suit:"錢幣"},
  {name:"錢幣十",   en:"Ten of Pentacles",    num:"10",   suit:"錢幣"},
  {name:"錢幣侍者", en:"Page of Pentacles",   num:"侍",   suit:"錢幣"},
  {name:"錢幣騎士", en:"Knight of Pentacles", num:"騎",   suit:"錢幣"},
  {name:"錢幣皇后", en:"Queen of Pentacles",  num:"后",   suit:"錢幣"},
  {name:"錢幣國王", en:"King of Pentacles",   num:"王",   suit:"錢幣"},
];

let selectedCount = 3;
let drawnCards = [];
let isDrawing = false;

// Stars
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = [];
  const n = Math.floor(canvas.width * canvas.height / 7000);
  for (let i = 0; i < n; i++)
    stars.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height,
      r:Math.random()*1.1+0.2, speed:Math.random()*0.005+0.002, phase:Math.random()*Math.PI*2 });
}
function animateStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const t = Date.now()*0.001;
  stars.forEach(s => {
    const a = 0.2 + 0.7*(0.5+0.5*Math.sin(t*s.speed*10+s.phase));
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,188,255,${a})`; ctx.fill();
  });
  requestAnimationFrame(animateStars);
}
initStars(); animateStars();
window.addEventListener('resize', initStars);

function selectCount(n) {
  selectedCount = n;
  document.querySelectorAll('.count-btn').forEach(b =>
    b.classList.toggle('active', +b.dataset.count === n));
}

function shuffle(count) {
  const idx = Array.from({length:78},(_,i)=>i);
  for (let i=idx.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [idx[i],idx[j]]=[idx[j],idx[i]];
  }
  return idx.slice(0,count).map(i=>({ card:TAROT[i], reversed:Math.random()<0.5 }));
}

function startDrawing() {
  if (isDrawing) return;
  isDrawing = true;
  const btn = document.getElementById('drawBtn');
  btn.disabled = true;
  document.getElementById('spreadContainer').classList.remove('visible');
  document.getElementById('actionArea').classList.remove('visible');
  document.getElementById('drawingAnim').classList.add('visible');

  drawnCards = shuffle(selectedCount);

  setTimeout(() => {
    document.getElementById('drawingAnim').classList.remove('visible');
    buildCards();
    // Show buttons after last card flips
    const totalDelay = 500 + (selectedCount - 1) * 1200 + 900;
    setTimeout(() => {
      document.getElementById('actionArea').classList.add('visible');
      isDrawing = false;
      btn.disabled = false;
    }, totalDelay);
  }, 1100);
}

function buildCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  // Layout class
  const cls = selectedCount >= 5 ? ' five-cards' : '';
  grid.className = 'cards-grid' + cls;

  document.getElementById('spreadTitle').textContent = `抽牌結果・共 ${selectedCount} 張`;

  drawnCards.forEach((drawn, i) => {
    const {card, reversed} = drawn;

    const slot = document.createElement('div');
    slot.className = 'card-slot';

    const inner = document.createElement('div');
    inner.className = 'card-inner';
    inner.id = `ci-${i}`;

    // Back face
    const back = document.createElement('div');
    back.className = 'card-face card-back';
    back.innerHTML = `<div class="card-back-inner"></div>`;

    // Front face
    const front = document.createElement('div');
    front.className = `card-face card-front${reversed?' reversed':''}`;
    front.innerHTML = `
      <div class="card-content">
        <span class="card-suit">${card.suit}</span>
        <span class="card-num">${card.num}</span>
        <span class="card-name-text">${card.name}</span>
        <span class="card-en">${card.en}</span>
        <span class="card-orient ${reversed?'rev':'up'}">${reversed?'▽ 逆位':'△ 正位'}</span>
      </div>`;

    inner.appendChild(back);
    inner.appendChild(front);
    slot.appendChild(inner);
    grid.appendChild(slot);

    setTimeout(() => {
      document.getElementById(`ci-${i}`)?.classList.add('flipped');
    }, 500 + i * 1200);
  });

  document.getElementById('spreadContainer').classList.add('visible');
}

function copyResult() {
  const question = document.getElementById('question').value.trim();
  let text = '';
  if (question) text += `問題：${question}\n\n`;
  text += `抽牌結果（共 ${selectedCount} 張）：\n`;
  text += '─────────────────\n';
  drawnCards.forEach((drawn, i) => {
    const {card, reversed} = drawn;
    text += `${i+1}. ${card.name}（${card.en}）${reversed?'【逆位】':'【正位】'}\n`;
  });
  text += '─────────────────\n';
  text += '請幫我解讀以上塔羅牌陣。';

  const btn = document.getElementById('copyBtn');
  const done = () => {
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 已複製！貼到 AI 解讀吧`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 複製問題 ＋ 抽牌結果`;
    }, 2800);
  };
  navigator.clipboard.writeText(text).then(done).catch(() => {
    const el = document.createElement('textarea');
    el.value = text; el.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
    done();
  });
}

function resetAll() {
  drawnCards = [];
  document.getElementById('question').value = '';
  document.getElementById('spreadContainer').classList.remove('visible');
  document.getElementById('actionArea').classList.remove('visible');
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
